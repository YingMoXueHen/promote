<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ========================================================== -->
    <!--  ⭐⭐⭐ 核心OG标签：决定微信/QQ里显示什么卡片 ⭐⭐⭐         -->
    <!-- ========================================================== -->

    <!-- 卡片标题 -->
    <meta property="og:title" content="🔥 限时抢购！全场低至3折" />

    <!-- 卡片描述 -->
    <meta property="og:description" content="品牌大促最后一天，点击立即抢购，错过等一年！" />

    <!-- 当前页面地址（改成你自己的） -->
    <meta property="og:url" content="https://yingmoxuehen.github.io/promote/promote.html" />

    <!-- 网站名称 -->
    <meta property="og:site_name" content="优选商城" />

    <!-- 卡片类型 -->
    <meta property="og:type" content="website" />

    <!-- ⚠️ 没有任何图片标签，一张图都没有 -->

    <!-- ========================================================== -->

    <title>限时抢购 - 优选商城</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .card-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.10);
        }

        .card-box h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .card-box p {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 48px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-box">
            <h1>🔥 限时抢购 · 全场3折起</h1>
            <p>品牌大促最后一天，点击下方按钮立即抢购，错过等一年！</p>
            <!-- ⭐ 把这个链接换成你的真实目标链接 -->
            <a href="https://mall.example.com/product/12345" class="btn">立即抢购 →</a>
            <div class="hint">🔒 安全支付 · 正品保障</div>
        </div>
    </div>

</body>
</html>
