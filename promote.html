<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- ========================================================== -->
    <!--  ⭐⭐⭐ 微信/QQ 卡片标签（不带图片）⭐⭐⭐                   -->
    <!-- ========================================================== -->
    <meta property="og:title" content="🔥 限时抢购！全场低至3折" />
    <meta property="og:description" content="品牌大促最后一天，点击立即抢购，错过等一年！" />
    <meta property="og:url" content="https://yingmoxuehen.github.io/promote/promote.html" />
    <meta property="og:site_name" content="优选商城" />
    <meta property="og:type" content="website" />
    <!-- 没有 og:image，微信会显示默认灰色图标 -->
    <!-- ========================================================== -->

    <title>限时抢购 - 优选商城</title>

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== 加载动画遮罩 ===== */
        #loaderOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.4s ease;
        }

        #loaderOverlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e8e8e8;
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== 主卡片 ===== */
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .card-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.10);
        }

        .card-box h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .card-box p {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 48px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
            transition: transform 0.2s;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
        }

        /* ===== 微信/QQ 拦截遮罩 ===== */
        #blockOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }

        #blockOverlay.show {
            display: flex;
        }

        .block-box {
            background: #fff;
            border-radius: 24px;
            max-width: 360px;
            width: 100%;
            padding: 40px 30px 35px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .block-box .icon-big {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .block-box h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .block-box p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .block-box .btn-open {
            display: inline-block;
            background: #007aff;
            color: #fff;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
            transition: background 0.2s, transform 0.15s;
        }

        .block-box .btn-open:active {
            background: #0066dd;
            transform: scale(0.96);
        }

        .block-box .hint-bottom {
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- ============================================================= -->
    <!--  加载动画遮罩（1秒后自动消失）                                 -->
    <!-- ============================================================= -->
    <div id="loaderOverlay">
        <div class="loader"></div>
    </div>

    <!-- ============================================================= -->
    <!--  主卡片                                                       -->
    <!-- ============================================================= -->
    <div class="container">
        <div class="card-box" id="mainCard">
            <h1>🔥 限时抢购 · 全场3折起</h1>
            <p>品牌大促最后一天，点击下方按钮立即抢购，错过等一年！</p>
            <a href="https://mall.example.com/product/12345" class="btn" id="gotoBtn">立即抢购 →</a>
            <div class="hint">🔒 安全支付 · 正品保障</div>
        </div>
    </div>

    <!-- ============================================================= -->
    <!--  微信/QQ 拦截遮罩                                              -->
    <!-- ============================================================= -->
    <div id="blockOverlay">
        <div class="block-box">
            <div class="icon-big">📱</div>
            <h2>请用浏览器打开</h2>
            <p>
                当前在微信/QQ内无法直接访问<br>
                点击下方按钮，使用系统浏览器打开
            </p>
            <button class="btn-open" id="openBrowserBtn">用浏览器打开</button>
            <div class="hint-bottom">🔒 安全加密链接 · 请放心访问</div>
        </div>
    </div>

    <!-- ============================================================= -->
    <!--  JavaScript                                                   -->
    <!-- ============================================================= -->
    <script>
        // ================================================================
        //  ⭐⭐⭐ 真实目标链接（只在这里配置一次）⭐⭐⭐
        // ================================================================
        const TARGET_URL = 'https://mall.example.com/product/12345';

        // ================================================================
        //  工具函数：检测微信 / QQ
        // ================================================================
        function isWechatOrQQ() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('micromessenger') !== -1 ||
                ua.indexOf('qq/') !== -1 ||
                ua.indexOf('mqqbrowser') !== -1;
        }

        // ================================================================
        //  DOM 引用
        // ================================================================
        const loader = document.getElementById('loaderOverlay');
        const blockOverlay = document.getElementById('blockOverlay');
        const mainCard = document.getElementById('mainCard');
        const gotoBtn = document.getElementById('gotoBtn');
        const openBtn = document.getElementById('openBrowserBtn');

        // ================================================================
        //  1. 加载动画：1秒后消失
        // ================================================================
        setTimeout(function() {
            loader.classList.add('hide');
            // 完全隐藏（避免占位）
            setTimeout(function() {
                loader.style.display = 'none';
            }, 500);
        }, 1000);

        // ================================================================
        //  2. 环境判断 & 行为绑定
        // ================================================================
        const isBlocked = isWechatOrQQ();

        if (isBlocked) {
            // ---- 微信/QQ 环境：显示遮罩，禁用所有跳转 ----
            blockOverlay.classList.add('show');

            // 阻止卡片点击跳转
            mainCard.addEventListener('click', function(e) {
                e.preventDefault();
            });

            // 阻止按钮点击跳转
            gotoBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                // 给用户一个视觉反馈
                gotoBtn.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    gotoBtn.style.transform = '';
                }, 200);
            });

            // “用浏览器打开”按钮：跳转到当前页面，让系统浏览器接管
            openBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                window.location.href = window.location.href;
            });

            console.log('🚫 当前在微信/QQ，已启用拦截');
        } else {
            // ---- 普通浏览器环境：正常跳转 ----
            blockOverlay.classList.remove('show');

            // 点击卡片任意位置跳转
            mainCard.addEventListener('click', function() {
                window.location.href = TARGET_URL;
            });

            // 按钮点击跳转（阻止事件冒泡，避免触发两次）
            gotoBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                window.location.href = TARGET_URL;
            });

            console.log('✅ 当前在普通浏览器，卡片可正常跳转');
            console.log('🎯 目标链接:', TARGET_URL);
        }

        // ================================================================
        //  3. 兜底：如果遮罩意外显示了但实际不是微信/QQ，强制隐藏
        // ================================================================
        if (!isWechatOrQQ()) {
            blockOverlay.classList.remove('show');
        }

        // ================================================================
        //  4. 防止遮罩背景点击穿透
        // ================================================================
        blockOverlay.addEventListener('click', function(e) {
            if (e.target === blockOverlay) {
                // 点击遮罩背景不做任何事，保持强制
            }
        });

        console.log('✅ 页面已加载完成');
    </script>

</body>
</html>
