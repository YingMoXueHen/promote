<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========== 微信/QQ 卡片元标签 ========== -->
    <meta property="og:title" content="限时福利！点击领取专属惊喜" />
    <meta property="og:description" content="超值好物等你来拿，手慢无！" />
    <meta property="og:image" content="https://picsum.photos/400/200?random=1" />
    <meta property="og:url" content="https://your-domain.com/landing-page" />
    <meta property="og:type" content="website" />
    
    <meta itemprop="image" content="https://picsum.photos/400/200?random=1" />
    <!-- ====================================== -->
    
    <title>限时福利</title>
    
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* ----- 卡片样式 ----- */
        .card {
            max-width: 380px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        
        .card:active {
            transform: scale(0.97);
        }
        
        /* 卡片头图 */
        .card-image {
            width: 100%;
            height: 200px;
            background: #e8ecf1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* 卡片内容 */
        .card-body {
            padding: 18px 20px 20px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.5;
            margin-bottom: 6px;
        }
        
        .card-desc {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
        }
        
        .card-footer {
            padding: 12px 20px 18px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-source {
            font-size: 13px;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .card-source .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #07c160;
            display: inline-block;
        }
        
        .card-btn {
            background: #07c160;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .card-btn:active {
            background: #06ad56;
        }
        
        /* ----- 微信/QQ 拦截遮罩 ----- */
        #blockOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none; /* 默认隐藏，JS检测到微信/QQ时显示 */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }
        
        #blockOverlay.show {
            display: flex;
        }
        
        .block-box {
            background: #fff;
            border-radius: 24px;
            max-width: 360px;
            width: 100%;
            padding: 40px 30px 35px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            animation: fadeUp 0.4s ease;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .block-box .icon-big {
            font-size: 56px;
            margin-bottom: 12px;
        }
        
        .block-box h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .block-box p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .block-box .btn-open {
            display: inline-block;
            background: #007aff;
            color: #fff;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
        }
        
        .block-box .btn-open:active {
            background: #0066dd;
            transform: scale(0.96);
        }
        
        .block-box .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
        }
        
        /* 隐藏真实链接的跳转锚点（不可见） */
        .hidden-link {
            display: none;
        }
    </style>
</head>
<body>

    <!-- ===== 主卡片 ===== -->
    <!-- 注意：href 里放的是你的真实目标链接，但对用户不可见（页面本身就是一个可点击卡片） -->
    <a href="https://www.example.com/your-real-target-page?utm_source=card" class="card" id="mainCard">
        <div class="card-image">
            <img src="https://picsum.photos/400/200?random=2" alt="封面图" loading="lazy">
        </div>
        <div class="card-body">
            <div class="card-title">🔥 今日精选 · 限时专属福利</div>
            <div class="card-desc">点击卡片立即查看，超值好物等你来拿～</div>
        </div>
        <div class="card-footer">
            <span class="card-source">
                <span class="dot"></span>
                官方推荐
            </span>
            <span class="card-btn">查看详情 →</span>
        </div>
    </a>

    <!-- ===== 微信/QQ 拦截遮罩 ===== -->
    <div id="blockOverlay">
        <div class="block-box">
            <div class="icon-big">📱</div>
            <h2>请用浏览器打开</h2>
            <p>
                当前在微信/QQ内无法直接访问<br>
                点击下方按钮，使用系统浏览器打开
            </p>
            <!-- 这个按钮点击后，会通过 JS 触发跳转 -->
            <button class="btn-open" id="openBrowserBtn">用浏览器打开</button>
            <div class="hint">🔒 安全加密链接 · 请放心访问</div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 检测是否在微信 / QQ 内置浏览器中
        // ============================================================
        function isWechatOrQQ() {
            const ua = navigator.userAgent.toLowerCase();
            // 微信：MicroMessenger   QQ： QQ/ 或 MQQBrowser（但 MQQBrowser 也包含在 QQ 里）
            const isWechat = ua.indexOf('micromessenger') !== -1;
            const isQQ = ua.indexOf('qq/') !== -1 || ua.indexOf('mqqbrowser') !== -1;
            return isWechat || isQQ;
        }

        // ============================================================
        //  2. 获取当前页面的真实 URL（用于生成“用浏览器打开”的链接）
        // ============================================================
        function getCurrentPageUrl() {
            return window.location.href;
        }

        // ============================================================
        //  3. 核心逻辑
        // ============================================================
        const overlay = document.getElementById('blockOverlay');
        const mainCard = document.getElementById('mainCard');
        const openBtn = document.getElementById('openBrowserBtn');

        // 判断环境
        const blocked = isWechatOrQQ();

        if (blocked) {
            // ---- 微信/QQ 环境：显示遮罩，禁用卡片点击 ----
            overlay.classList.add('show');
            
            // 阻止卡片点击（防止用户直接跳转）
            mainCard.addEventListener('click', function(e) {
                e.preventDefault();
                // 可选的：给用户一个轻提示，或者直接无视
            });

            // “用浏览器打开”按钮：尝试唤起浏览器
            openBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const url = getCurrentPageUrl();
                // 方式1：尝试使用 location.href 跳转（部分浏览器会拦截）
                // 方式2：使用 window.open 尝试唤起外部浏览器
                // 对于微信/QQ，最通用的办法是引导用户点击右上角“···” → “在浏览器中打开”
                // 但我们依然尝试用 location.href 跳转（部分安卓QQ支持）
                window.location.href = url;
                // 备用：如果上面没反应，给用户提示
                setTimeout(function() {
                    // 如果5秒后还在当前页，提醒用户手动操作
                    // 但这里不做强制，因为用户可能已经跳走了
                }, 5000);
            });

            // 额外：提示用户也可以使用右上角菜单
            console.log('当前在微信/QQ内，已启用拦截遮罩');
        } else {
            // ---- 正常浏览器环境：卡片正常点击跳转 ----
            overlay.classList.remove('show');
            // 卡片默认 <a> 标签行为保留，点击即跳转
            // 但我们可以加一点埋点或额外逻辑（可选）
            mainCard.addEventListener('click', function(e) {
                // 正常跳转，无需额外操作
                // 如果你想要统计点击，可以在这里加 console.log 或 埋点
                console.log('卡片被点击，跳转至:', this.href);
            });
        }

        // ============================================================
        //  4. （可选）检测到非微信/QQ时，隐藏遮罩并确保卡片可点
        // ============================================================
        // 兜底：如果因为某些原因遮罩显示了但实际不是微信/QQ，强行隐藏
        if (!isWechatOrQQ()) {
            overlay.classList.remove('show');
            // 移除 card 上的阻止事件（如果有）
            mainCard.onclick = null;
        }

        // ============================================================
        //  5. 针对 iOS 微信的特殊处理（防止遮罩被点击穿透）
        // ============================================================
        overlay.addEventListener('click', function(e) {
            // 如果用户点击遮罩背景（非弹窗区域），不关闭，保持强制
            if (e.target === overlay) {
                // 可以加一个轻微震动反馈，但不做关闭
                // 防止用户误触穿透
            }
        });

        console.log('✅ 卡片化隐藏链接已生效');
        console.log('当前环境:', isWechatOrQQ() ? '微信/QQ' : '浏览器');
    </script>

</body>
</html>
