<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ========================================================== -->
    <!--  ⭐⭐⭐ 核心：以下标签决定了微信/QQ里显示什么卡片 ⭐⭐⭐     -->
    <!-- ========================================================== -->

    <!-- 1. 卡片标题（必填） -->
    <meta property="og:title" content="🔥 限时抢购！全场低至3折" />

    <!-- 2. 卡片描述（必填） -->
    <meta property="og:description" content="品牌大促最后一天，点击立即抢购，错过等一年！" />

    <!-- 3. 卡片图片（必填，建议 宽高比 1:1 或 2.5:1，最小 300x300） -->
    <meta property="og:image" content="https://your-domain.com/images/card-cover.jpg" />

    <!-- 4. 卡片链接（必填，就是当前页面地址） -->
    <meta property="og:url" content="https://your-domain.com/landing-page" />

    <!-- 5. 网站名称（可选，显示在卡片底部） -->
    <meta property="og:site_name" content="优选商城" />

    <!-- 6. 卡片类型（固定为 website） -->
    <meta property="og:type" content="website" />

    <!-- 7. 微信专用：备用图片（如果 og:image 失效） -->
    <meta itemprop="image" content="https://your-domain.com/images/card-cover.jpg" />

    <!-- ========================================================== -->

    <title>限时抢购 - 优选商城</title>

    <style>
        /* 用户打开页面后看到的样式（不是卡片样式，是落地页样式） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .card img {
            width: 100%;
            display: block;
        }
        .card-body {
            padding: 24px 20px 30px;
        }
        .card-body h1 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .card-body p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 48px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <!-- 落地页显示的大图（可以和卡片图一致，也可以不同） -->
            <img src="https://your-domain.com/images/page-banner.jpg" alt="活动封面">
            <div class="card-body">
                <h1>🔥 限时抢购 · 全场3折起</h1>
                <p>品牌大促最后一天，点击下方按钮立即抢购，错过等一年！</p>
                <!-- 这里的按钮才是用户点击后真正到达的地方 -->
                <a href="https://mall.example.com/product/12345?utm_source=card" class="btn">立即抢购 →</a>
                <div class="hint">🔒 安全支付 · 正品保障</div>
            </div>
        </div>
    </div>

</body>
</html>
